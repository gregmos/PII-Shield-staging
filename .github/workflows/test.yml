name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["18", "20"]
    defaults:
      run:
        working-directory: nodejs-v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: nodejs-v2/package-lock.json

      # --ignore-scripts keeps sharp's postinstall native build from failing
      # on CI runners that lack libvips — text-only NER doesn't use sharp
      # and the runtime bundle ships a shim that intercepts sharp loads
      # anyway. --legacy-peer-deps tolerates the peer-dep drift in
      # @xenova/transformers@2.17.2 + onnxruntime-* 1.22.0.
      - name: Install dev deps
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Type-check
        run: node node_modules/typescript/bin/tsc --noEmit

      - name: MCP protocol smoke
        run: node scripts/smoke-protocol.mjs
